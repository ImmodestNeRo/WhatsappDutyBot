version: '3.9'

services:
  bot:
    build: .
    container_name: duty-bot
    restart: always

    env_file:
      - .env

    environment:
      - PYTHONUNBUFFERED=1
      - DATA_DIR=/app/data

    volumes:
      # Persistent data (session.db, bot_state.json, logs) — КРИТИЧНО
      - ./data:/app/data

    stdin_open: true
    tty: true
